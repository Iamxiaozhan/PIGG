<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>仪表盘 · 天气 & 生活</title>
  <!-- 字体与图标 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif; min-height:100vh; padding:12px;
      background: #0b1120; transition: background 0.4s, color 0.2s;
      color: #fff; -webkit-font-smoothing: antialiased;
      position: relative; overflow-x: hidden;
    }
    /* 主题背景 */
    body.theme-clear-day { background: linear-gradient(145deg, #fce38a 0%, #fbb13c 100%); color:#1e1e2a; }
    body.theme-clear-night { background: radial-gradient(circle at 30% 20%, #1b2b4e, #0b0f1a); color:#e5e9ff; }
    body.theme-cloudy { background: linear-gradient(145deg, #5f6c7a, #374151); color:#f0f4fa; }
    body.theme-rainy { background: linear-gradient(145deg, #3a4a5f, #1e2a3a); color:#e2e8f0; }
    body.theme-snowy { background: linear-gradient(145deg, #b3d9ff, #7ba9d9); color:#0a1e2c; }
    body.theme-foggy { background:#a0b0c0; color:#15202b; }

    #weatherEffect { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; overflow:hidden; }
    .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }

    .dashboard {
      max-width: 1600px; margin:0 auto; position:relative; z-index:5;
      display:grid; grid-template-columns: 1fr 340px; gap:18px;
    }

    /* 毛玻璃卡片 */
    .glass-panel {
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(20,30,45,0.25); border-radius: 36px; padding: 20px 22px;
      box-shadow: 0 25px 40px -10px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.12);
    }

    /* 左侧主区 */
    .weather-main { display:flex; flex-direction:column; gap:16px; }

    /* 顶栏 */
    .top-bar {
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
      backdrop-filter: blur(20px); background:rgba(20,30,45,0.2);
      border-radius: 48px; padding:6px 14px; border:1px solid rgba(255,255,255,0.15);
    }
    .city-info-group { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.06); border-radius:40px; padding:4px 10px 4px 14px; }
    #currentCityName { font-weight:600; font-size:1rem; }
    .location-dot { width:8px; height:8px; border-radius:50%; background:#2ecc71; margin-left:6px; }
    .location-dot.manual { background:#f1c40f; }
    #citySelect { background:transparent; border:none; color:inherit; font-weight:500; padding:8px 20px 8px 4px; border-radius:40px; outline:none; cursor:pointer; backdrop-filter:blur(4px); appearance:none; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat:no-repeat; background-position:right 8px center; background-size:14px; }
    #citySelect option { background:#1e293b; }

    .source-selector { display:flex; align-items:center; background:rgba(255,255,255,0.06); border-radius:40px; padding:4px 10px; }
    #dataSourceSelect { background:transparent; border:none; color:inherit; font-weight:500; padding:8px 24px 8px 8px; border-radius:40px; outline:none; appearance:none; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat:no-repeat; background-position:right 8px center; background-size:12px; }

    .search-wrapper { flex:1; display:flex; background:rgba(255,255,255,0.06); border-radius:40px; padding:3px; min-width:160px; }
    .search-wrapper input { flex:1; background:transparent; border:none; padding:10px 14px; color:inherit; outline:none; font-size:0.95rem; }
    .search-wrapper button { background:rgba(255,255,255,0.15); border:none; border-radius:40px; padding:0 16px; margin:2px; color:inherit; cursor:pointer; }
    .refresh-btn { background:rgba(255,255,255,0.1); width:44px; height:44px; border-radius:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; }

    /* 今日天气卡片 */
    .today-card { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; padding:22px 24px; }
    .today-left { display:flex; align-items:center; gap:18px; }
    .weather-icon-main { font-size:5.5rem; filter:drop-shadow(0 8px 12px #00000040); }
    .current-temp { font-size:5rem; font-weight:700; letter-spacing:-2px; }
    .unit { font-size:2rem; }
    .weather-desc { font-size:1.4rem; opacity:0.9; }
    .feels-like { opacity:0.8; }
    .today-details { display:grid; grid-template-columns:repeat(3,auto); gap:24px; text-align:right; }
    .detail-value { font-size:1.8rem; font-weight:600; }

    /* 横向城市卡片 */
    .city-strip-title { font-size:1.2rem; font-weight:600; margin-bottom:8px; }
    .city-strip { display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; -webkit-overflow-scrolling:touch; }
    .city-card { background:rgba(255,255,255,0.08); backdrop-filter:blur(8px); padding:14px 16px; border-radius:28px; min-width:110px; text-align:center; border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:0.2s; flex-shrink:0; }
    .city-card:active { background:rgba(255,255,255,0.2); }
    .city-card.active { border:2px solid #ffd764; }
    .city-card-icon { font-size:2rem; }

    /* 小时预报 */
    .hourly-scroll { display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; -webkit-overflow-scrolling:touch; }
    .hourly-item { background:rgba(255,255,255,0.06); backdrop-filter:blur(8px); padding:14px 10px; border-radius:26px; min-width:75px; text-align:center; flex-shrink:0; }
    .hourly-icon { font-size:2rem; }

    /* 3天预报 */
    .daily-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .daily-card { background:rgba(255,255,255,0.06); backdrop-filter:blur(8px); padding:16px 8px; border-radius:26px; text-align:center; }

    /* 右侧边栏 */
    .sidebar { display:flex; flex-direction:column; gap:18px; }
    .time-card { text-align:center; padding:28px 16px; }
    #currentTime { font-size:3.5rem; font-weight:700; letter-spacing:2px; }
    #currentDate { font-size:1.2rem; opacity:0.8; margin-top:6px; }
    .greeting { font-size:1.6rem; font-weight:500; margin-top:12px; }

    .quick-launch { display:flex; flex-direction:column; gap:14px; }
    .launch-btn {
      background:rgba(255,255,255,0.08); backdrop-filter:blur(8px);
      border-radius:32px; padding:18px 20px; border:1px solid rgba(255,255,255,0.1);
      display:flex; align-items:center; gap:18px; cursor:pointer; transition:0.2s;
      text-decoration:none; color:inherit;
    }
    .launch-btn:active { background:rgba(255,255,255,0.2); transform:translateY(-2px); }
    .launch-btn i { font-size:2.2rem; width:40px; text-align:center; color:#ffd966; }
    .launch-btn span { font-size:1.2rem; font-weight:600; }

    /* ---------- 移动端强制样式 (通过JS添加类 .is-mobile) ---------- */
    body.is-mobile {
      padding:6px;
    }
    body.is-mobile .dashboard {
      grid-template-columns:1fr !important;
      gap:12px !important;
    }
    body.is-mobile .sidebar {
      order:-1 !important;
    }
    body.is-mobile .glass-panel {
      border-radius: 24px !important;
      padding: 14px 12px !important;
    }
    body.is-mobile .top-bar {
      flex-direction:column !important;
      align-items:stretch !important;
      gap:6px !important;
      border-radius: 32px !important;
      padding:10px 12px !important;
    }
    body.is-mobile .city-info-group,
    body.is-mobile .source-selector {
      width:100% !important;
      justify-content:space-between !important;
    }
    body.is-mobile .search-wrapper {
      width:100% !important;
    }
    body.is-mobile .refresh-btn {
      align-self:flex-end !important;
      margin-top:-44px !important;
    }
    body.is-mobile .today-card {
      flex-direction:column !important;
      align-items:stretch !important;
      gap:16px !important;
      padding:18px 14px !important;
    }
    body.is-mobile .today-left {
      justify-content:space-around !important;
    }
    body.is-mobile .weather-icon-main {
      font-size:4.5rem !important;
    }
    body.is-mobile .current-temp {
      font-size:4rem !important;
    }
    body.is-mobile .unit {
      font-size:1.6rem !important;
    }
    body.is-mobile .today-details {
      grid-template-columns:repeat(3,1fr) !important;
      text-align:center !important;
      gap:8px !important;
    }
    body.is-mobile .detail-value {
      font-size:1.5rem !important;
    }
    body.is-mobile .city-card {
      padding:12px 12px !important;
      min-width:100px !important;
    }
    body.is-mobile .city-card-icon {
      font-size:1.8rem !important;
    }
    body.is-mobile .hourly-item {
      padding:10px 6px !important;
      min-width:65px !important;
    }
    body.is-mobile .hourly-icon {
      font-size:1.8rem !important;
    }
    body.is-mobile .daily-card {
      padding:12px 4px !important;
    }
    body.is-mobile .time-card {
      padding:18px 10px !important;
    }
    body.is-mobile #currentTime {
      font-size:2.8rem !important;
    }
    body.is-mobile #currentDate {
      font-size:1rem !important;
    }
    body.is-mobile .greeting {
      font-size:1.3rem !important;
    }
    body.is-mobile .launch-btn {
      padding:16px !important;
      gap:14px !important;
    }
    body.is-mobile .launch-btn i {
      font-size:2rem !important;
      width:36px !important;
    }
    body.is-mobile .launch-btn span {
      font-size:1.1rem !important;
    }
    /* 超小屏进一步调整 */
    @media screen and (max-width: 480px) {
      body.is-mobile .today-left {
        flex-direction:column !important;
        text-align:center !important;
      }
      body.is-mobile .weather-icon-main {
        font-size:4rem !important;
      }
      body.is-mobile .current-temp {
        font-size:3.5rem !important;
      }
      body.is-mobile .refresh-btn {
        margin-top:-48px !important;
      }
    }

    /* 背景动画 */
    .cloud { position:absolute; background:rgba(255,255,255,0.2); backdrop-filter:blur(8px); border-radius:80px; animation:floatCloud linear infinite; }
    .cloud::before,.cloud::after { content:''; position:absolute; background:inherit; border-radius:50%; }
    .cloud::before { width:60%; height:100%; top:-40%; left:8%; }
    .cloud::after { width:45%; height:120%; top:-30%; right:10%; }
    @keyframes floatCloud { 0%{ transform:translateX(-20vw); } 100%{ transform:translateX(120vw); } }
    .raindrop { position:absolute; width:2px; height:60px; background:linear-gradient(to bottom, rgba(200,220,255,0.7), rgba(160,200,255,0.2)); animation:rainFall linear infinite; }
    @keyframes rainFall { 0%{ transform:translateY(-20vh) rotate(10deg); opacity:0.8; } 100%{ transform:translateY(120vh) rotate(10deg); opacity:0.2; } }
    .snowflake { position:absolute; background:white; border-radius:50%; animation:snowFall linear infinite; }
    @keyframes snowFall { 0%{ transform:translateY(-10vh) rotate(0deg); } 100%{ transform:translateY(110vh) rotate(360deg); } }
    .sun-glow { position:absolute; width:400px; height:400px; background:radial-gradient(circle, rgba(255,240,150,0.25) 0%, transparent 70%); animation:pulseGlow 8s infinite alternate; }
    @keyframes pulseGlow { 0%{ opacity:0.2; transform:scale(1); } 100%{ opacity:0.6; transform:scale(1.4); } }
  </style>
</head>
<body id="appBody" class="theme-clear-day">
  <div id="weatherEffect"></div>
  <div class="stars" id="starsContainer"></div>
  <div class="loading-overlay" id="loadingOverlay" style="display:none;"><div class="loading-spinner"></div></div>

  <div class="dashboard">
    <!-- 左侧天气主区 -->
    <div class="weather-main">
      <div class="top-bar">
        <div class="city-info-group">
          <i class="fas fa-map-marker-alt"></i>
          <span id="currentCityName">北京</span>
          <span class="location-dot" id="locationDot"></span>
          <select id="citySelect">
            <option value="auto">📍 自动定位</option>

      </div>

      <div class="glass-panel today-card">
        <div class="today-left">
          <div class="weather-icon-main" id="mainWeatherIcon"><i class="wi wi-day-sunny"></i></div>

            <div class="current-temp"><span id="currentTemp">--</span><span class="unit">°C</span></div>

          <div><span class="detail-label"><i class="fas fa-tint"></i> 湿度</span><div class="detail-value" id="humidityValue">--%</div></div>
          <div><span class="detail-label"><i class="fas fa-wind"></i> 风速</span><div class="detail-value" id="windValue">-- km/h</div></div>
          <div><span class="detail-label"><i class="fas fa-umbrella"></i> 降水</span><div class="detail-value" id="precipValue">--%</div></div>
        </div>
      </div>

      <div class="city-strip-title"><i class="fas fa-city"></i> 热门城市</div>
      <div class="city-strip" id="cityStripContainer"></div>

      <div class="glass-panel">
        <div style="font-size:1.2rem; font-weight:600; margin-bottom:14px;"><i class="fas fa-clock"></i> 24小时预报</div>
        <div class="hourly-scroll" id="hourlyContainer"></div>
      </div>

      <div class="glass-panel">
        <div style="font-size:1.2rem; font-weight:600; margin-bottom:14px;"><i class="fas fa-calendar-alt"></i> 未来3天</div>
        <div class="daily-grid" id="dailyContainer"></div>
      </div>
      <div style="display:flex; justify-content:space-between; opacity:0.7; padding:0 8px; font-size:0.9rem;">
        <span><i class="fas fa-exclamation-triangle"></i> <span id="alertText">暂无预警</span></span>
        <span>🌐 <span id="currentSourceLabel">Open-Meteo</span></span>
      </div>
    </div>

    <!-- 右侧边栏 -->
    <div class="sidebar">
      <div class="glass-panel time-card">
        <div id="currentTime">--:--</div>
        <div id="currentDate">----年--月--日</div>
        <div class="greeting" id="greetingText">下午好</div>
        <div style="margin-top:16px; opacity:0.7;"><i class="fas fa-cloud-sun"></i> 愿你拥有美好的一天</div>
      </div>
      <div class="glass-panel quick-launch">
        <div class="launch-btn" onclick="window.open('https://你的用户名.github.io/game-lobby/', '_blank')">
          <i class="fas fa-gamepad"></i>
          <span>游戏大厅</span>
        </div>
        <div class="launch-btn" onclick="window.open('https://你的用户名.github.io/memory-lane/', '_blank')">
          <i class="fas fa-images"></i>
          <span>回忆长廊</span>
        </div>
        <div class="launch-btn" style="opacity:0.6;">
          <i class="fas fa-music"></i>
          <span>音乐盒子</span>
        </div>
      </div>
      <div style="text-align:center; opacity:0.5; font-size:0.75rem;">© 2026 灵动生活 · 仪表盘</div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // ----- 强制移动端适配 (主动检测并添加类) -----
      function applyMobileClass() {
        const isMobile = window.innerWidth <= 800;
        if (isMobile) {
          document.body.classList.add('is-mobile');
        } else {
          document.body.classList.remove('is-mobile');
        }
      }
      applyMobileClass();
      window.addEventListener('resize', applyMobileClass);
      // 每次UI更新后可能触发重绘，使用MutationObserver确保类不被移除 (但通常不会)
      const observer = new MutationObserver(() => applyMobileClass());
      observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

      // 时间更新
      function updateDateTime() {
        const now = new Date();
        document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour12: false, hour:'2-digit', minute:'2-digit' });
        const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
        document.getElementById('currentDate').textContent = `${y}年${m}月${d}日`;
        const hour = now.getHours();
        let greet = hour<12 ? '早安' : (hour<18 ? '下午好' : '晚安');
        document.getElementById('greetingText').textContent = greet;
      }
      updateDateTime();
      setInterval(updateDateTime, 1000);

      // 天气逻辑
      const bodyEl = document.getElementById('appBody');
      const effectLayer = document.getElementById('weatherEffect');
      const starsContainer = document.getElementById('starsContainer');
      const citySelect = document.getElementById('citySelect');
      const dataSourceSelect = document.getElementById('dataSourceSelect');
      const searchBtn = document.getElementById('searchBtn');
      const refreshBtn = document.getElementById('refreshWeatherBtn');
      const currentCitySpan = document.getElementById('currentCityName');
      const locationDot = document.getElementById('locationDot');
      const currentSourceLabel = document.getElementById('currentSourceLabel');
      const mainIcon = document.getElementById('mainWeatherIcon');
      const currentTemp = document.getElementById('currentTemp');
      const weatherDesc = document.getElementById('weatherDesc');
      const feelsLike = document.getElementById('feelsLike');
      const humidityVal = document.getElementById('humidityValue');
      const windVal = document.getElementById('windValue');
      const precipVal = document.getElementById('precipValue');
      const hourlyContainer = document.getElementById('hourlyContainer');
      const dailyContainer = document.getElementById('dailyContainer');
      const alertText = document.getElementById('alertText');
      const cityStrip = document.getElementById('cityStripContainer');

      let currentLat=39.9042, currentLon=116.4074, currentCityName='北京', isAuto=false, currentDataSource='openmeteo';

      const cityCoords = {
        beijing:{lat:39.9042,lon:116.4074,name:'北京'}, shanghai:{lat:31.2304,lon:121.4737,name:'上海'},
        guangzhou:{lat:23.1291,lon:113.2644,name:'广州'}, shenzhen:{lat:22.5431,lon:114.0579,name:'深圳'},
        hangzhou:{lat:30.2741,lon:120.1551,name:'杭州'}, chengdu:{lat:30.5728,lon:104.0668,name:'成都'}
      };
      const hotCities = [
        {name:'北京',lat:39.9042,lon:116.4074},{name:'上海',lat:31.2304,lon:121.4737},{name:'广州',lat:23.1291,lon:113.2644},
        {name:'深圳',lat:22.5431,lon:114.0579},{name:'杭州',lat:30.2741,lon:120.1551},{name:'成都',lat:30.5728,lon:104.0668},
        {name:'西安',lat:34.3416,lon:108.9398},{name:'武汉',lat:30.5928,lon:114.3055}
      ];

      function updateCityDisplay(name, auto){ currentCitySpan.textContent=name; locationDot.classList.toggle('manual',!auto); locationDot.style.background=auto?'#2ecc71':'#f1c40f'; }
      function generateMockData(lat,lon){ 
        const seed=Math.abs(Math.sin(lat*lon)*100), temp=Math.round(15+seed*0.8), code=[0,1,2,3,51,61,71][Math.floor(seed)%7];
        const isDay=new Date().getHours()>6&&new Date().getHours()<18?1:0;
        return {current:{temperature_2m:temp,apparent_temperature:temp-2,relative_humidity_2m:50+(seed%40),wind_speed_10m:5+(seed%15),weather_code:code,is_day:isDay},
          hourly:{time:Array.from({length:24},(_,i)=>new Date(Date.now()+i*3600000).toISOString()),temperature_2m:Array.from({length:24},(_,i)=>temp+Math.sin(i)*5),weather_code:Array(24).fill(code),is_day:Array(24).fill(isDay),precipitation_probability:Array(24).fill(seed%30)},
          daily:{time:Array.from({length:4},(_,i)=>new Date(Date.now()+i*86400000).toISOString().split('T')[0]),temperature_2m_max:[temp+2,temp+3,temp+1,temp+4],temperature_2m_min:[temp-4,temp-3,temp-5,temp-2],weather_code:[code,(code+1)%10,code,(code+2)%10]}};
      }
      async function fetchRealWeather(lat,lon){ const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code,is_day,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=4`); return r.json(); }
      function getIcon(code,isDay){ const m={0:{d:'wi-day-sunny',n:'wi-night-clear',desc:'晴朗'},1:{d:'wi-day-sunny-overcast',n:'wi-night-alt-partly-cloudy',desc:'大部晴'},2:{d:'wi-day-cloudy',n:'wi-night-alt-cloudy',desc:'多云'},3:{d:'wi-cloud',n:'wi-cloud',desc:'阴'},45:{d:'wi-fog',n:'wi-fog',desc:'雾'},51:{d:'wi-sprinkle',n:'wi-sprinkle',desc:'小雨'},61:{d:'wi-rain',n:'wi-rain',desc:'雨'},71:{d:'wi-snow',n:'wi-snow',desc:'雪'},80:{d:'wi-showers',n:'wi-showers',desc:'阵雨'},95:{d:'wi-thunderstorm',n:'wi-thunderstorm',desc:'雷暴'}}; const e=m[code]||{d:'wi-na',n:'wi-na',desc:'未知'}; return {iconClass:isDay?e.d:e.n,desc:e.desc}; }
      function applyThemeAndEffect(code,isDay){
        bodyEl.className=''; if(code<=1) bodyEl.classList.add(isDay?'theme-clear-day':'theme-clear-night'); else if(code<=3) bodyEl.classList.add('theme-cloudy'); else if([51,61,80].includes(code)) bodyEl.classList.add('theme-rainy'); else if(code===71) bodyEl.classList.add('theme-snowy'); else bodyEl.classList.add('theme-foggy');
        effectLayer.innerHTML=''; if([51,61,80].includes(code)) for(let i=0;i<60;i++){ let d=document.createElement('div'); d.className='raindrop'; d.style.left=Math.random()*100+'%'; d.style.animationDuration=(0.8+Math.random()*1.2)+'s'; effectLayer.appendChild(d); } else if(code===71) for(let i=0;i<50;i++){ let f=document.createElement('div'); f.className='snowflake'; f.style.width=f.style.height=(6+Math.random()*12)+'px'; f.style.left=Math.random()*100+'%'; effectLayer.appendChild(f); } else if(code>=2) for(let i=0;i<8;i++){ let c=document.createElement('div'); c.className='cloud'; c.style.width=(180+Math.random()*200)+'px'; c.style.height=(c.style.width.replace('px','')*0.45)+'px'; c.style.top=(5+Math.random()*40)+'%'; effectLayer.appendChild(c); } else if(isDay){ let g=document.createElement('div'); g.className='sun-glow'; g.style.top='20%'; g.style.left='70%'; effectLayer.appendChild(g); }
        starsContainer.innerHTML=(!isDay&&code<=1)?Array(60).fill().map(()=>{let s=document.createElement('div'); s.className='star'; s.style.cssText=`width:${2+Math.random()*4}px;height:${s.style.width};left:${Math.random()*100}%;top:${Math.random()*100}%`; return s;}).forEach(s=>starsContainer.appendChild(s)):'';
        // 关键：每次主题更新后重新应用移动类，防止被覆盖
        applyMobileClass();
      }
      function updateUI(data){
        const c=data.current, h=data.hourly, d=data.daily; const temp=Math.round(c.temperature_2m); const {iconClass,desc}=getIcon(c.weather_code,c.is_day);
        mainIcon.innerHTML=`<i class="wi ${iconClass}"></i>`; currentTemp.textContent=temp; weatherDesc.textContent=desc; feelsLike.textContent=`体感 ${Math.round(c.apparent_temperature)}°`;
        humidityVal.textContent=`${c.relative_humidity_2m}%`; windVal.textContent=`${Math.round(c.wind_speed_10m)} km/h`; precipVal.textContent=`${h.precipitation_probability?.[0]??0}%`;
        applyThemeAndEffect(c.weather_code,c.is_day);
        hourlyContainer.innerHTML = h.time.slice(0,12).map((t,i)=>{ let hr=new Date(t).getHours(); let ic=getIcon(h.weather_code[i*2], h.is_day[i*2]); return `<div class="hourly-item"><div>${hr}:00</div><div class="hourly-icon"><i class="wi ${ic.iconClass}"></i></div><div>${Math.round(h.temperature_2m[i*2])}°</div></div>`; }).join('');
        const wd=['周日','周一','周二','周三','周四','周五','周六']; dailyContainer.innerHTML = d.time.slice(1,4).map((t,i)=>{ let dt=new Date(t); let ic=getIcon(d.weather_code[i+1],true); return `<div class="daily-card"><div>${wd[dt.getDay()]}</div><div><i class="wi ${ic.iconClass}"></i></div><div>${Math.round(d.temperature_2m_max[i+1])}° ${Math.round(d.temperature_2m_min[i+1])}°</div></div>`; }).join('');
        alertText.textContent = c.weather_code>=95?'⚡雷暴':c.weather_code>=71?'❄️降雪':c.weather_code>=51?'☔降雨':'暂无预警';
        currentSourceLabel.textContent = currentDataSource==='openmeteo'?'Open-Meteo':'模拟数据';
        applyMobileClass(); // 再次确保
      }
      async function loadWeather(lat,lon,cityName,auto){
        try{ const data = currentDataSource==='openmeteo' ? await fetchRealWeather(lat,lon) : generateMockData(lat,lon); updateCityDisplay(cityName,auto); updateUI(data); }catch(e){ alert('获取失败'); }
      }
      async function loadCityStrip(){ 
        const results = await Promise.all(hotCities.map(async c=>{ try{ const data = currentDataSource==='openmeteo' ? await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=temperature_2m,weather_code,is_day&timezone=auto`)).json() : generateMockData(c.lat,c.lon); const icon=getIcon(data.current.weather_code,data.current.is_day); return {...c, temp:Math.round(data.current.temperature_2m), iconClass:icon.iconClass}; }catch{ return {...c, temp:'--', iconClass:'wi-na'}; } }));
        cityStrip.innerHTML = results.map(c=>`<div class="city-card" data-lat="${c.lat}" data-lon="${c.lon}" data-name="${c.name}"><div>${c.name}</div><div class="city-card-icon"><i class="wi ${c.iconClass}"></i></div><div>${c.temp}°</div></div>`).join('');
        document.querySelectorAll('.city-card').forEach(card=> card.addEventListener('click', ()=>{ const lat=parseFloat(card.dataset.lat), lon=parseFloat(card.dataset.lon), name=card.dataset.name; currentLat=lat; currentLon=lon; currentCityName=name; isAuto=false; loadWeather(lat,lon,name,false); citySelect.value=''; }));
      }
      async function autoLocate(){ if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(async pos=>{ currentLat=pos.coords.latitude; currentLon=pos.coords.longitude; let name='定位点'; try{ const rev=await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${currentLat}&longitude=${currentLon}&language=zh`); const j=await rev.json(); name=j.results?.[0]?.name||'定位点'; }catch{} currentCityName=name; isAuto=true; citySelect.value='auto'; loadWeather(currentLat,currentLon,name,true); },()=>{ setDefault(); }); } else setDefault(); }
      function setDefault(){ currentLat=39.9042; currentLon=116.4074; currentCityName='北京'; isAuto=false; loadWeather(39.9042,116.4074,'北京',false); citySelect.value='beijing'; }
      citySelect.addEventListener('change', e=>{ const v=e.target.value; if(v==='auto') autoLocate(); else if(cityCoords[v]){ const c=cityCoords[v]; currentLat=c.lat; currentLon=c.lon; currentCityName=c.name; isAuto=false; loadWeather(c.lat,c.lon,c.name,false); } });
      dataSourceSelect.addEventListener('change', e=>{ currentDataSource=e.target.value; loadCityStrip(); if(currentLat) loadWeather(currentLat,currentLon,currentCityName,isAuto); });
      searchBtn.addEventListener('click', async ()=>{ const q=document.getElementById('citySearchInput').value.trim(); if(!q) return; try{ const res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=1&language=zh`); const j=await res.json(); if(j.results?.length){ const r=j.results[0]; currentLat=r.latitude; currentLon=r.longitude; currentCityName=r.name||q; isAuto=false; loadWeather(r.latitude,r.longitude,currentCityName,false); citySelect.value=''; }else alert('未找到'); }catch{ alert('搜索失败'); } });
      refreshBtn.addEventListener('click', ()=>{ if(currentLat) loadWeather(currentLat,currentLon,currentCityName,isAuto); else autoLocate(); });

      loadCityStrip();
      if(navigator.geolocation) autoLocate(); else setDefault();
    })();
  </script>
</body>
